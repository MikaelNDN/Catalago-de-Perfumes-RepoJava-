# Configuracao do Banco de Dados (Híbrido: Railway + Local)
# O Railway fornece as variaveis PGHOST, PGPORT, etc. automaticamente.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:mcosmeticos}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:mikaelfelix123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Senha do Admin
app.admin.senha=${ADMIN_PASSWORD}

# Configuracao Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}