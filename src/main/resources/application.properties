# Configuracao do Banco de Dados (Pega da nuvem ou do seu PC)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mcosmeticos}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:mikaelfelix123}
